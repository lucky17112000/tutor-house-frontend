<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
.label{font:600 11px var(--font-sans);letter-spacing:.04em;text-transform:uppercase;color:#6b7280;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font:600 11px var(--font-sans);letter-spacing:.06em;text-transform:uppercase;color:#52525b;margin-bottom:6px}
.iwrap{position:relative}
.iwrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:#a1a1aa;stroke-width:2;stroke:currentColor;fill:none}
.iwrap input{width:100%;height:40px;border-radius:14px;border:1px solid #e4e4e7;padding:0 12px 0 38px;font:400 14px var(--font-sans);outline:none;box-sizing:border-box;background:#fff;transition:border-color .2s, box-shadow .2s}
.iwrap input:focus{border-color:transparent;box-shadow:0 0 0 3px rgba(99,102,241,.5)}
</style></head><body>
<div class="label">Inputs — labeled, leading icon, focus ring</div>
<div class="field">
  <label>Email Address</label>
  <div class="iwrap">
    <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
    <input type="email" placeholder="you@example.com" value="alex@tutorhouse.app">
  </div>
</div>
<div class="field">
  <label>Password</label>
  <div class="iwrap">
    <svg viewBox="0 0 24 24"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 1 1 8 0v4"/></svg>
    <input type="password" placeholder="Min. 8 characters" value="••••••••">
  </div>
</div>
</body></html>
