<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
.label{font:600 11px var(--font-sans);letter-spacing:.04em;text-transform:uppercase;color:#6b7280;margin-bottom:14px}
.row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar{height:18px;background:#e9d5ff;border-radius:4px}
.t{font:500 11px var(--font-mono);color:#525252;min-width:70px}
</style></head><body>
<div class="label">Spacing scale (Tailwind, used in container px / section py / gaps)</div>
<div class="row"><div class="t">1 / 4px</div><div class="bar" style="width:4px"></div></div>
<div class="row"><div class="t">2 / 8px</div><div class="bar" style="width:8px"></div></div>
<div class="row"><div class="t">3 / 12px</div><div class="bar" style="width:12px"></div></div>
<div class="row"><div class="t">4 / 16px</div><div class="bar" style="width:16px"></div></div>
<div class="row"><div class="t">6 / 24px</div><div class="bar" style="width:24px"></div></div>
<div class="row"><div class="t">8 / 32px</div><div class="bar" style="width:32px"></div></div>
<div class="row"><div class="t">12 / 48px</div><div class="bar" style="width:48px"></div></div>
<div class="row"><div class="t">20 / 80px</div><div class="bar" style="width:80px"></div></div>
<div class="row"><div class="t">24 / 96px</div><div class="bar" style="width:96px"></div></div>
</body></html>
