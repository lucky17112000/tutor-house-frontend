<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:0;background:#fff;font-family:var(--font-sans)}
.lbl{padding:14px 24px;font:600 11px var(--font-sans);letter-spacing:.04em;text-transform:uppercase;color:#6b7280}

</style></head><body>
<div class="lbl">Brand wordmark — the only logo</div>
<div class="brand">Tutor House</div>
