<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
.label{font:600 11px var(--font-sans);letter-spacing:.04em;text-transform:uppercase;color:#6b7280;margin-bottom:14px}
.row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.chip{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#a78bfa,#ec4899);display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 8px 18px -4px rgba(147,51,234,.4)}
.chip svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.chip2{background:linear-gradient(135deg,#f472b6,#fb7185)}
.chip3{background:linear-gradient(135deg,#fbbf24,#f97316)}
.chip4{background:linear-gradient(135deg,#60a5fa,#22d3ee)}
.chip5{background:linear-gradient(135deg,#34d399,#0ea5e9)}
.note{font:500 12px var(--font-mono);color:#71717a;margin-left:8px}
</style></head><body>
<div class="label">Icon chips — gradient bg, white lucide stroke icon</div>
<div class="row">
  <div class="chip"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
  <div class="chip chip2"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
  <div class="chip chip3"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg></div>
  <div class="chip chip4"><svg viewBox="0 0 24 24"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3z"/></svg></div>
  <div class="chip chip5"><svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></div>
</div>
<div class="note">Lucide icons • 22px • white stroke 2px • shadow tinted to gradient hue</div>
</body></html>
