<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:#fff}
.row{display:flex;gap:14px;align-items:stretch}
.swatch{flex:1;border-radius:14px;height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;color:#fff;font:600 12px var(--font-sans);box-shadow:var(--shadow-md)}
.swatch .hex{font:500 11px var(--font-mono);opacity:.85}
.label{font:600 11px var(--font-sans);letter-spacing:.04em;text-transform:uppercase;color:#6b7280;margin-bottom:8px}
.grad{flex:2;background:var(--th-brand-gradient)}
.cta{background:var(--th-cta-gradient)}
</style></head><body>
<div class="label">Brand gradient — wordmark, primary CTA, animated underlines</div>
<div class="row">
  <div class="swatch grad"><div>Brand gradient<br><span class="hex">blue-600 → purple-600 → pink-600</span></div></div>
  <div class="swatch cta"><div>CTA gradient<br><span class="hex">indigo-600 → purple-600</span></div></div>
</div>
<div style="height:14px"></div>
<div class="row">
  <div class="swatch" style="background:#2563eb"><div>blue-600<br><span class="hex">#2563EB</span></div></div>
  <div class="swatch" style="background:#9333ea"><div>purple-600<br><span class="hex">#9333EA</span></div></div>
  <div class="swatch" style="background:#db2777"><div>pink-600<br><span class="hex">#DB2777</span></div></div>
  <div class="swatch" style="background:#4f46e5"><div>indigo-600<br><span class="hex">#4F46E5</span></div></div>
</div>
</body></html>
