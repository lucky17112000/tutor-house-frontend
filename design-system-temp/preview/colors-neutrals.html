<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
.label{font:600 11px var(--font-sans);letter-spacing:.04em;text-transform:uppercase;color:#6b7280;margin-bottom:10px}
.row{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
.s{border-radius:10px;height:78px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;font:600 11px var(--font-sans);border:1px solid rgba(0,0,0,.06)}
.s .v{font:500 10px var(--font-mono);opacity:.7}
</style></head><body>
<div class="label">Neutral scale (shadcn neutral, OKLCH)</div>
<div class="row">
  <div class="s" style="background:oklch(1 0 0);color:#111"><div>bg</div><div class="v">1.000</div></div>
  <div class="s" style="background:oklch(0.985 0 0);color:#111"><div>sidebar</div><div class="v">0.985</div></div>
  <div class="s" style="background:oklch(0.97 0 0);color:#111"><div>muted</div><div class="v">0.97</div></div>
  <div class="s" style="background:oklch(0.922 0 0);color:#111"><div>border</div><div class="v">0.922</div></div>
  <div class="s" style="background:oklch(0.708 0 0);color:#fff"><div>ring</div><div class="v">0.708</div></div>
  <div class="s" style="background:oklch(0.556 0 0);color:#fff"><div>fg-muted</div><div class="v">0.556</div></div>
  <div class="s" style="background:oklch(0.205 0 0);color:#fff"><div>primary</div><div class="v">0.205</div></div>
</div>
</body></html>
