<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:30px;background:#fafafa;font-family:var(--font-sans)}
.label{font:600 11px var(--font-sans);letter-spacing:.04em;text-transform:uppercase;color:#6b7280;margin-bottom:18px}
.row{display:flex;gap:22px;align-items:flex-end;justify-content:center}
.b{width:90px;height:60px;background:#fff;border-radius:14px;display:flex;align-items:center;justify-content:center;font:500 11px var(--font-mono);color:#525252}
.s-xs{box-shadow:0 1px 2px rgb(0 0 0/.05)}
.s-sm{box-shadow:0 1px 3px rgb(0 0 0/.08),0 1px 2px -1px rgb(0 0 0/.06)}
.s-md{box-shadow:0 4px 8px -2px rgb(0 0 0/.1),0 2px 4px -2px rgb(0 0 0/.06)}
.s-lg{box-shadow:0 10px 22px -4px rgb(0 0 0/.12),0 4px 8px -4px rgb(0 0 0/.08)}
.s-xl{box-shadow:0 20px 40px -8px rgb(0 0 0/.18)}
.s-purple{box-shadow:0 12px 30px -6px rgba(147,51,234,.45)}
</style></head><body>
<div class="label">Shadow scale (incl. brand-tinted glow)</div>
<div class="row">
  <div class="b s-xs">xs</div>
  <div class="b s-sm">sm</div>
  <div class="b s-md">md</div>
  <div class="b s-lg">lg</div>
  <div class="b s-xl">xl</div>
  <div class="b s-purple" style="background:linear-gradient(to right,#4f46e5,#9333ea);color:#fff">purple</div>
</div>
</body></html>
