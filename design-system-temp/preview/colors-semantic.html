<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
.label{font:600 11px var(--font-sans);letter-spacing:.04em;text-transform:uppercase;color:#6b7280;margin-bottom:10px}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.s{border-radius:10px;height:80px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font:600 12px var(--font-sans);color:#fff}
.s .v{font:500 10px var(--font-mono);opacity:.85}
</style></head><body>
<div class="label">Functional / semantic colors</div>
<div class="row">
  <div class="s" style="background:#4f46e5"><div>Accent</div><div class="v">indigo-600</div></div>
  <div class="s" style="background:oklch(0.577 0.245 27.325)"><div>Destructive</div><div class="v">red-600</div></div>
  <div class="s" style="background:#facc15;color:#111"><div>Star / Rating</div><div class="v">yellow-400</div></div>
  <div class="s" style="background:#16a34a"><div>Success</div><div class="v">green-600</div></div>
  <div class="s" style="background:#9333ea"><div>Selected</div><div class="v">purple-600</div></div>
</div>
</body></html>
