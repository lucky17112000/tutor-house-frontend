<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  :root {
    --blue: #1d4ed8;
    --blue-deep: #1e3a8a;
    --blue-bright: #2563eb;
    --ink: #0a0a0a;
    --ink-2: #18181b;
    --white: #ffffff;
    --line: rgba(10,10,10,0.1);
  }
  body {
    margin: 0;
    padding: 40px 32px;
    background: var(--white);
    font-family: var(--font-sans);
    color: var(--ink);
  }
  .label {
    font: 600 11px var(--font-sans);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(10,10,10,0.5);
    margin-bottom: 18px;
  }
  .group {
    margin-bottom: 36px;
  }
  .row {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: center;
  }

  /* =========================================================
     BASE
     ========================================================= */
  .btn {
    --h: 44px;
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    height: var(--h);
    padding: 0 26px;
    border-radius: 999px;
    font: 500 14.5px/1 var(--font-sans);
    letter-spacing: -0.005em;
    cursor: pointer;
    border: 0;
    overflow: hidden;
    isolation: isolate;
    user-select: none;
    background: var(--ink);
    color: var(--white);
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1),
                box-shadow 0.4s cubic-bezier(0.2, 0.8, 0.2, 1),
                color 0.3s ease,
                background 0.3s ease;
  }
  .btn .arrow {
    width: 14px; height: 14px;
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .btn:hover .arrow { transform: translateX(4px); }
  .btn:active { transform: scale(0.97); }

  /* =========================================================
     PRIMARY — black with blue wipe (left → right)
     ========================================================= */
  .btn-primary {
    background: var(--ink);
    color: var(--white);
    box-shadow: 0 6px 16px -6px rgba(10,10,10,0.4);
  }
  .btn-primary::before {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--blue);
    transform: translateX(-101%);
    transition: transform 0.5s cubic-bezier(0.65, 0, 0.35, 1);
    z-index: -1;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 28px -8px rgba(29,78,216,0.55);
  }
  .btn-primary:hover::before { transform: translateX(0); }

  /* =========================================================
     BLUE — solid blue → black wipe
     ========================================================= */
  .btn-blue {
    background: var(--blue);
    color: var(--white);
    box-shadow: 0 8px 20px -8px rgba(29,78,216,0.5);
  }
  .btn-blue::before {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--ink);
    transform: translateX(101%);
    transition: transform 0.5s cubic-bezier(0.65, 0, 0.35, 1);
    z-index: -1;
  }
  .btn-blue:hover {
    transform: translateY(-2px);
    box-shadow: 0 16px 32px -10px rgba(10,10,10,0.5);
  }
  .btn-blue:hover::before { transform: translateX(0); }

  /* =========================================================
     OUTLINE — blue border, fills with blue on hover
     ========================================================= */
  .btn-outline {
    background: transparent;
    color: var(--ink);
    box-shadow: inset 0 0 0 1.5px var(--ink);
  }
  .btn-outline::before {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--blue);
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.45s cubic-bezier(0.65, 0, 0.35, 1);
    z-index: -1;
  }
  .btn-outline:hover {
    color: var(--white);
    box-shadow: inset 0 0 0 1.5px var(--blue), 0 12px 24px -8px rgba(29,78,216,0.4);
    transform: translateY(-2px);
  }
  .btn-outline:hover::before { transform: scaleY(1); }

  /* =========================================================
     GHOST — transparent, blue ink on hover, animated underline
     ========================================================= */
  .btn-ghost {
    background: transparent;
    color: var(--ink);
    padding: 0 22px;
  }
  .btn-ghost::after {
    content: "";
    position: absolute;
    left: 22px; right: 22px; bottom: 12px;
    height: 1.5px;
    background: var(--blue);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .btn-ghost:hover { color: var(--blue); }
  .btn-ghost:hover::after { transform: scaleX(1); }

  /* =========================================================
     ICON-ONLY — magnetic circle
     ========================================================= */
  .btn-icon {
    width: 44px; height: 44px;
    padding: 0;
    border-radius: 999px;
    background: var(--ink);
    color: var(--white);
  }
  .btn-icon::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 999px;
    background: var(--blue);
    transform: scale(0);
    transition: transform 0.5s cubic-bezier(0.65, 0, 0.35, 1);
    z-index: -1;
  }
  .btn-icon:hover { transform: translateY(-2px) rotate(-8deg); }
  .btn-icon:hover::before { transform: scale(1); }

  /* =========================================================
     SLIDE-IN ICON — text slides left on hover, arrow appears from right
     ========================================================= */
  .btn-slide {
    background: var(--white);
    color: var(--ink);
    box-shadow: inset 0 0 0 1.5px var(--ink);
    padding: 0 28px;
    overflow: hidden;
  }
  .btn-slide .label-text {
    transition: transform 0.45s cubic-bezier(0.65, 0, 0.35, 1);
  }
  .btn-slide .arrow-wrap {
    position: absolute;
    right: 22px;
    transform: translateX(28px);
    opacity: 0;
    transition: transform 0.45s cubic-bezier(0.65, 0, 0.35, 1),
                opacity 0.3s ease;
  }
  .btn-slide:hover {
    background: var(--blue);
    color: var(--white);
    box-shadow: inset 0 0 0 1.5px var(--blue), 0 14px 28px -8px rgba(29,78,216,0.5);
    transform: translateY(-2px);
  }
  .btn-slide:hover .label-text { transform: translateX(-12px); }
  .btn-slide:hover .arrow-wrap { transform: translateX(0); opacity: 1; }

  /* =========================================================
     SHIMMER — black with sliding light streak
     ========================================================= */
  .btn-shimmer {
    background: var(--ink);
    color: var(--white);
    box-shadow: 0 8px 20px -8px rgba(10,10,10,0.5);
  }
  .btn-shimmer::after {
    content: "";
    position: absolute;
    top: 0; left: -120%;
    width: 60%; height: 100%;
    background: linear-gradient(110deg,
      transparent 30%,
      rgba(255,255,255,0.18) 50%,
      transparent 70%);
    transform: skewX(-20deg);
    transition: left 0.7s cubic-bezier(0.65, 0, 0.35, 1);
  }
  .btn-shimmer:hover {
    transform: translateY(-2px);
    background: var(--blue);
    box-shadow: 0 14px 28px -8px rgba(29,78,216,0.55);
  }
  .btn-shimmer:hover::after { left: 130%; }

  /* =========================================================
     SIZES
     ========================================================= */
  .btn-lg { --h: 52px; padding: 0 32px; font-size: 15.5px; }
  .btn-sm { --h: 36px; padding: 0 18px; font-size: 13px; gap: 6px; }
  .btn-icon.btn-lg { width: 52px; height: 52px; padding: 0; }
  .btn-icon.btn-sm { width: 36px; height: 36px; padding: 0; }

  /* Keep above other layers */
  .btn > * { position: relative; z-index: 1; }
</style>
</head>
<body>

<div class="group">
  <div class="label">Filled — primary, blue, shimmer</div>
  <div class="row">
    <button class="btn btn-primary">
      <span>Get started</span>
      <svg class="arrow" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="btn btn-blue">
      <span>Book a session</span>
      <svg class="arrow" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="btn btn-shimmer">
      <span>Confirm booking</span>
    </button>
  </div>
</div>

<div class="group">
  <div class="label">Outline &amp; ghost — black on white</div>
  <div class="row">
    <button class="btn btn-outline">
      <span>Browse tutors</span>
    </button>
    <button class="btn btn-slide">
      <span class="label-text">View profile</span>
      <span class="arrow-wrap">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
    </button>
    <button class="btn btn-ghost">
      <span>Cancel</span>
    </button>
  </div>
</div>

<div class="group">
  <div class="label">Icon &amp; sizes</div>
  <div class="row">
    <button class="btn btn-icon" aria-label="Continue">
      <svg width="16" height="16" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="btn btn-primary btn-lg">
      <span>Sign up free</span>
      <svg class="arrow" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="btn btn-blue btn-sm">
      <span>Save</span>
    </button>
    <button class="btn btn-outline btn-sm">
      <span>Skip</span>
    </button>
  </div>
</div>

<div class="group" style="background: var(--ink); margin: 0 -32px; padding: 32px;">
  <div class="label" style="color: rgba(255,255,255,0.5);">On dark — inverted</div>
  <div class="row">
    <button class="btn" style="background: var(--white); color: var(--ink); box-shadow: 0 6px 16px -6px rgba(0,0,0,0.5);">
      <span>Get started</span>
      <svg class="arrow" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="btn btn-blue">
      <span>Book now</span>
      <svg class="arrow" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="btn" style="background: transparent; color: var(--white); box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.4);">
      <span>Learn more</span>
    </button>
  </div>
</div>

</body>
</html>
