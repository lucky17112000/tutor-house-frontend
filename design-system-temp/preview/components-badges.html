<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
.label{font:600 11px var(--font-sans);letter-spacing:.04em;text-transform:uppercase;color:#6b7280;margin-bottom:14px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.eyebrow{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:999px;background:#f3e8ff;color:#7e22ce;font:600 11px var(--font-sans);letter-spacing:.06em;text-transform:uppercase}
.eyebrow .dot{width:6px;height:6px;border-radius:50%;background:#9333ea}
.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;font:600 12px var(--font-sans)}
.solid{background:#4f46e5;color:#fff;box-shadow:0 4px 12px rgba(79,70,229,.4)}
.success{background:#dcfce7;color:#166534}
.warn{background:#fef3c7;color:#92400e}
.danger{background:#fee2e2;color:#991b1b}
.outline{background:#fff;color:#52525b;border:1px solid #e4e4e7}
</style></head><body>
<div class="label">Eyebrows + badges</div>
<div class="row">
  <span class="eyebrow"><span class="dot"></span>What Drives Us</span>
  <span class="eyebrow"><span class="dot"></span>Meet The Team</span>
  <span class="eyebrow"><span class="dot"></span>Our Story</span>
</div>
<div style="height:14px"></div>
<div class="row">
  <span class="pill solid">$45/hr</span>
  <span class="pill success">Available</span>
  <span class="pill warn">Pending</span>
  <span class="pill danger">Cancelled</span>
  <span class="pill outline">Math</span>
  <span class="pill outline">Physics</span>
</div>
</body></html>
