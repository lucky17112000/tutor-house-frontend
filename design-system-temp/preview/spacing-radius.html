<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
.label{font:600 11px var(--font-sans);letter-spacing:.04em;text-transform:uppercase;color:#6b7280;margin-bottom:14px}
.row{display:flex;gap:12px;align-items:flex-end}
.box{background:#fafafa;border:1px dashed #d4d4d8;display:flex;align-items:center;justify-content:center;font:500 11px var(--font-mono);color:#525252}
</style></head><body>
<div class="label">Border radius scale</div>
<div class="row">
  <div class="box" style="width:80px;height:60px;border-radius:6px">md / 6</div>
  <div class="box" style="width:80px;height:60px;border-radius:8px">8</div>
  <div class="box" style="width:80px;height:60px;border-radius:10px">lg / 10</div>
  <div class="box" style="width:80px;height:60px;border-radius:14px">xl / 14</div>
  <div class="box" style="width:80px;height:60px;border-radius:18px">2xl / 18</div>
  <div class="box" style="width:80px;height:60px;border-radius:22px">3xl / 22</div>
  <div class="box" style="width:80px;height:60px;border-radius:9999px">pill</div>
</div>
</body></html>
